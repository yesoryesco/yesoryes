<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YES | YES</title>
    <meta name="description" content="YES | YES • There is no maybe." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-label="Brand hero">
        <h1 class="wordmark" aria-label="YES YES">
          <span class="yes yes-light">YES</span>
          <span class="divider" aria-hidden="true">|</span>
          <span class="yes yes-regular">YES</span>
        </h1>
        <p class="tagline">There is no <i>maybe</i>.</p>
      </section>

      <footer>
        <p>
          <small>&copy; <span id="year"></span></small>
        </p>
        <script>
          const yearEl = document.getElementById("year");
          if (yearEl) yearEl.textContent = String(new Date().getFullYear());
        </script>
      </footer>
    </main>
  </body>
</html>
