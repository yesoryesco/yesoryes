<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>yesoryes.co</title>
    <meta name="description" content="yesoryes.co" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-one" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-two" aria-hidden="true"></div>
    <main class="stage">
      <div class="content">
        <h1>Yes or Yes</h1>
        <p class="motto">There is no maybe.</p>
      </div>
      <footer>
        <p>
          <small>&copy; <span id="year"></span></small>
        </p>
      </footer>
    </main>
    <script>
      const yearEl = document.getElementById("year");
      if (yearEl) yearEl.textContent = String(new Date().getFullYear());
    </script>
  </body>
